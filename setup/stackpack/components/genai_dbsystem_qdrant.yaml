nodes:
  - id: -100
    name: genai.dbsystem.qdrant
    iconbase64: data:image/svg+xml;base64,
    identifier: urn:system:auto:component-type:genai.dbsystem.qdrant
    highlights:
      namePlural: db_systems
      fields:
        - fieldId: type
          label:
            title: Type
          valueExtractor:
            _type: ComponentTypeSource
          display:
            _type: TagDisplay
          _type: ComponentTypeField
        - fieldId: health
          label:
            title: Health
          valueExtractor:
            _type: HealthSource
          display:
            _type: HealthBadgeDisplay
          _type: ComponentTypeField
        - fieldId: labels
          label:
            title: Labels
          valueExtractor:
            _type: TagsSource
          display:
            singular: label
            _type: TagDisplay
          _type: ComponentTypeField
      about:
        fields:
          - type
          - health
          - labels
        _type: ComponentTypeAbout
      events:
        showEvents: false
        _type: ComponentTypeEvents
      showLogs: false
      showLastChange: false
      externalComponent:
        showConfiguration: false
        showStatus: false
        externalIdSelector: "^openlit:urn:open-telemetry:"
        _type: ComponentTypeExternalComponent
      relatedResources:
        - resourceType: genai.dboperation
          title: Operations
          stql: (withNeighborsOf(direction = "down", components = (id = "{COMPONENT_ID}"),
            levels = "1")) and type = "genai.dboperation"
          _type: ComponentTypeRelatedResources
        - resourceType: otel service
          title: Related Open Telemetry services
          stql: (withNeighborsOf(direction = "up", components = (id = "{COMPONENT_ID}"),
            levels = "1")) and type = "otel service"
          viewTypeIdentifier: urn:stackpack:open-telemetry:shared:view-type:service
          _type: ComponentTypeRelatedResources

      metrics:
        - name: Collections
          description: Collection and vector counts
          bindings:
          - urn:stackpack:qdrant:shared:metric-binding:vectordb-collections-total
          - urn:stackpack:qdrant:shared:metric-binding:vectordb-vectors-total
          defaultExpanded: true
          _type: ComponentTypeMetricCategory
        - name: REST API
          description: REST API response metrics
          bindings:
          - urn:stackpack:qdrant:shared:metric-binding:vectordb-rest-responses-total
          - urn:stackpack:qdrant:shared:metric-binding:vectordb-rest-responses-fail
          - urn:stackpack:qdrant:shared:metric-binding:vectordb-rest-responses-avg-duration
          defaultExpanded: true
          _type: ComponentTypeMetricCategory
        - name: gRPC API
          description: gRPC API response metrics
          bindings:
          - urn:stackpack:qdrant:shared:metric-binding:vectordb-grpc-responses-total
          - urn:stackpack:qdrant:shared:metric-binding:vectordb-grpc-responses-fail
          - urn:stackpack:qdrant:shared:metric-binding:vectordb-grpc-responses-avg-duration
          defaultExpanded: true
          _type: ComponentTypeMetricCategory
        - name: Hardware
          description: Process resource utilization
          bindings:
          - urn:stackpack:qdrant:shared:metric-binding:vectordb-cpu-usage
          - urn:stackpack:qdrant:shared:metric-binding:vectordb-memory-active
          defaultExpanded: true
          _type: ComponentTypeMetricCategory
      _type: ComponentTypeHighlights
    _type: ComponentType
