        primary: true
    scope: type in ("genai.dbsystem.qdrant")
    identifier: urn:stackpack:qdrant:shared:metric-binding:vectordb-rest-responses-total
    unit: reqps
    chartType: line
    priority: high
    enabled: true
    layout:
      metricPerspective:
        tab: VectorDB
        section: REST API
      componentSummary:
        weight: 3
    _type: MetricBinding

  - id: -504
    name: REST Responses Failed
