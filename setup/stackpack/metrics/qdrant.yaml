nodes:
  # Collections
  - id: -501
    name: Collections Total
    description: "Total number of collections"
    queries:
      - expression: collections_total{}
        alias: Collections
        primary: true
    scope: type in ("genai.dbsystem.qdrant")
    identifier: urn:stackpack:qdrant:shared:metric-binding:vectordb-collections-total
    unit: short
    chartType: line
    tags:
      experimental_chartType: Gauge
      enableGaugeChart: "1"
    priority: high
    enabled: true
    layout:
      metricPerspective:
        tab: VectorDB
        section: Collections
      componentSummary:
        weight: 3
    _type: MetricBinding

  - id: -502
    name: Vectors Total
    description: "Total number of vectors across all collections"
    queries:
      - expression: collections_vector_total{}
        alias: Vectors
        primary: true
    scope: type in ("genai.dbsystem.qdrant")
    identifier: urn:stackpack:qdrant:shared:metric-binding:vectordb-vectors-total
    unit: short
    chartType: line
    tags:
      experimental_chartType: Gauge
      enableGaugeChart: "1"
    priority: high
    enabled: true
    layout:
      metricPerspective:
        tab: VectorDB
        section: Collections
      componentSummary:
        weight: 3
    _type: MetricBinding

  # REST API
  - id: -503
    name: REST Responses Total
    description: "Total number of REST API responses"
    queries:
