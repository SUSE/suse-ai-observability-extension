version: '3'

dotenv: ['./.env']

vars:
  IMAGE: '{{.IMAGE_NAME | default "suse-ai-observability"}}'
  VERSION: '{{.IMAGE_VERSION | default "latest"}}'
  RUNTIME: '{{.CONTAINER_RUNTIME | default "podman"}}'

tasks:
  build:
    desc: Build the setup container image
    cmds:
      - '{{.RUNTIME}} build -f Dockerfile -t {{.IMAGE}}:{{.VERSION}} .'

  push:
    desc: Push the setup container image
    cmds:
      - '{{.RUNTIME}} push {{.IMAGE}}:{{.VERSION}}'

  version-up:
    desc: Increments the stackpack version (patch)
    cmds:
      - |
        VERSION=$(grep 'version =' stackpack/suse-ai/stackpack.conf | cut -d'"' -f2)
        BASE=$(echo $VERSION | cut -d'.' -f1-2)
        PATCH=$(echo $VERSION | cut -d'.' -f3)
        NEW_PATCH=$((PATCH + 1))
        NEW_VERSION="$BASE.$NEW_PATCH"
        sed -i "s/version = \"$VERSION\"/version = \"$NEW_VERSION\"/" stackpack/suse-ai/stackpack.conf
        echo "StackPack version updated to $NEW_VERSION"

  stackpack-upload:
    desc: Zips, uploads and upgrades the stackpack
    cmds:
      - |
        cd stackpack/suse-ai
        zip -r /tmp/suse-ai.sts stackpack.conf provisioning resources
        sts stackpack upload --file /tmp/suse-ai.sts
        sts stackpack upgrade --name suse-ai --unlocked-strategy overwrite

  stackpack-uninstall:
    desc: Uninstall all installed instances of SUSE AI Observability stackpack
    cmds:
      - |
        sts stackpack list-instances --name suse-ai -o json | jq -r '.instances[] | select(.status == "INSTALLED" or .status == "ERROR") | .id' | while read ID; do
          echo "Uninstalling instance $ID"
          sts stackpack uninstall --id "$ID" --name suse-ai
        done

  sts-script:
    desc: Runs a Groovy script from a file (use FILE=path/to/script.groovy)
    cmds:
      - sts script run --file "{{.FILE}}"

  lint:
    desc: Lint Groovy scripts with npm-groovy-lint
    cmds:
      - npx npm-groovy-lint --files "stackpack/suse-ai/provisioning/**/*.groovy" --no-insight --failon error {{.LINT_ARGS}}

  lint-fix:
    desc: Auto-fix Groovy lint errors and warnings
    cmds:
      - npx npm-groovy-lint --files "stackpack/suse-ai/provisioning/**/*.groovy" --no-insight --fix --failon error

  test-static:
    desc: Run static validation tests (no infrastructure needed)
    dir: tests
    cmds:
      - go test ./static/... {{.TEST_ARGS}}

  test-init:
    desc: Run init.sh tests with bats
    cmds:
      - bats {{.BATS_ARGS}} tests/init/

  test-integration:
    desc: Run integration tests against a running StackState (set STACKSTATE_API_URL and STACKSTATE_API_TOKEN)
    dir: tests
    cmds:
      - go test -tags=integration ./integration/... -v -timeout 10m

  infra-up:
    desc: Provision a local K3d cluster with SUSE Observability (requires SUSE_OBSERVABILITY_LICENSE, APPCO_EMAIL, APPCO_TOKEN)
    cmds:
      - tests/infra/setup.sh up

  infra-down:
    desc: Tear down the local K3d test cluster
    cmds:
      - tests/infra/setup.sh down

  infra-status:
    desc: Show status of the local test cluster
    cmds:
      - tests/infra/setup.sh status

  test-integration-local:
    desc: Spin up local StackState, run integration tests, and tear down
    cmds:
      - task: infra-up
      - defer: { task: infra-down }
      - eval "$(tests/infra/setup.sh env)" && cd tests && go test -tags=integration ./integration/... -v -timeout 10m

  test-all:
    desc: Run all tests (static, init, integration)
    cmds:
      - task: test-static
      - task: test-init
      - task: test-integration

  check:
    desc: "Run all local validations (lint + static tests + init tests). Use VERBOSE=1 for detailed output, SILENT=1 for minimal output."
    vars:
      LINT_ARGS: '{{if eq (default "" .SILENT) "1"}}--loglevel warning{{end}}'
      TEST_ARGS: '{{if eq (default "" .VERBOSE) "1"}}-v{{else if eq (default "" .SILENT) "1"}}-count=1{{else}}-v{{end}}'
      BATS_ARGS: '{{if eq (default "" .SILENT) "1"}}--formatter tap{{end}}'
    cmds:
      - task: lint
        vars: { LINT_ARGS: "{{.LINT_ARGS}}" }
      - task: test-static
        vars: { TEST_ARGS: "{{.TEST_ARGS}}" }
      - task: test-init
        vars: { BATS_ARGS: "{{.BATS_ARGS}}" }

  deploy:
    desc: Validate, version-up, and upload the StackPack
    cmds:
      - task: check
      - task: version-up
      - task: stackpack-upload
