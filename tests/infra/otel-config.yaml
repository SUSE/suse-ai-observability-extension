receivers:
  otlp:
    protocols:
      grpc:
        endpoint: 0.0.0.0:4317
      http:
        endpoint: 0.0.0.0:4318

processors:
  batch:
    timeout: 10s
    send_batch_size: 1024

  resource:
    attributes:
      - key: k8s.cluster.name
        value: test-cluster
        action: upsert
      - key: suse.ai.managed
        value: "true"
        action: upsert

exporters:
  otlp:
    endpoint: ${STACKSTATE_OTLP_ENDPOINT}
    headers:
      Authorization: "SUSEObservability ${STACKSTATE_API_KEY}"
    tls:
      insecure: true

  debug:
    verbosity: basic

service:
  pipelines:
    traces:
      receivers: [otlp]
      processors: [resource, batch]
      exporters: [otlp, debug]

    metrics:
      receivers: [otlp]
      processors: [resource, batch]
      exporters: [otlp, debug]
