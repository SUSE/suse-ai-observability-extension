apiVersion: apps/v1
kind: Deployment
metadata:
  name: milvus
  namespace: suse-private-ai
  labels:
    app: milvus
spec:
  replicas: 1
  selector:
    matchLabels:
      app: milvus
  template:
    metadata:
      labels:
        app: milvus
    spec:
      containers:
        - name: milvus
          image: milvusdb/milvus:latest
          command: ["milvus", "run", "standalone"]
          ports:
            - containerPort: 19530
              name: grpc
            - containerPort: 9091
              name: metrics
          env:
            - name: ETCD_USE_EMBED
              value: "true"
            - name: COMMON_STORAGETYPE
              value: "local"
          resources:
            requests:
              cpu: 500m
              memory: 1Gi
            limits:
              cpu: "2"
              memory: 4Gi
---
apiVersion: v1
kind: Service
metadata:
  name: milvus
  namespace: suse-private-ai
  labels:
    app: milvus
spec:
  selector:
    app: milvus
  ports:
    - name: grpc
      port: 19530
      targetPort: 19530
    - name: metrics
      port: 9091
      targetPort: 9091
