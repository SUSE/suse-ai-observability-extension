apiVersion: apps/v1
kind: Deployment
metadata:
  name: vllm
  namespace: suse-private-ai
  labels:
    app: vllm
spec:
  replicas: 1
  selector:
    matchLabels:
      app: vllm
  template:
    metadata:
      labels:
        app: vllm
    spec:
      containers:
        - name: vllm
          image: vllm/vllm-openai:latest
          args:
            - "--model"
            - "facebook/opt-125m"
            - "--dtype"
            - "float32"
            - "--device"
            - "cpu"
            - "--max-model-len"
            - "512"
          ports:
            - containerPort: 8000
              name: http
          resources:
            requests:
              cpu: "1"
              memory: 2Gi
            limits:
              cpu: "2"
              memory: 4Gi
---
apiVersion: v1
kind: Service
metadata:
  name: vllm
  namespace: suse-private-ai
  labels:
    app: vllm
spec:
  selector:
    app: vllm
  ports:
    - name: http
      port: 8000
      targetPort: 8000
