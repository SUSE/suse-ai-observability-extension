# SUSE Observability (StackState) cannot run as a standalone Docker container.
# It requires Kubernetes with Helm and includes Kafka, Elasticsearch, HBase,
# and PostgreSQL as built-in dependencies.
#
# For local integration testing, use the setup.sh script which provisions
# a K3d cluster and deploys StackState via Helm.
#
# For quick testing against an existing instance, set environment variables
# directly (see setup.sh --help).
#
# This file provides only the OTel Collector for scenarios where StackState
# is already running (e.g., on an existing cluster) and you only need a
# local collector to send test telemetry.

services:
  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.125.0
    container_name: otel-collector-test
    ports:
      - "4317:4317"
      - "4318:4318"
    volumes:
      - ./otel-config.yaml:/etc/otelcol-contrib/config.yaml
    environment:
      - STACKSTATE_OTLP_ENDPOINT=${STACKSTATE_OTLP_ENDPOINT:-host.docker.internal:443}
      - STACKSTATE_API_KEY=${STACKSTATE_API_KEY}
