version: '3.8'

services:
  stackstate:
    image: stackstate/stackstate-server-2:latest
    container_name: stackstate-test
    ports:
      - "7070:7070"
      - "7071:7071"
    environment:
      - LICENSE_KEY=${STACKSTATE_LICENSE_KEY}
      - STACKSTATE_ADMIN_PASSWORD=${STACKSTATE_ADMIN_PASSWORD:-admin}
    volumes:
      - stackstate-data:/opt/stackstate/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:7070/api/server/info"]
      interval: 30s
      timeout: 10s
      retries: 10
      start_period: 120s

  otel-collector:
    image: otel/opentelemetry-collector-contrib:latest
    container_name: otel-collector-test
    ports:
      - "4317:4317"   # OTLP gRPC receiver
      - "4318:4318"   # OTLP HTTP receiver
      - "8888:8888"   # Prometheus metrics exposed by the collector
      - "8889:8889"   # Prometheus exporter
    volumes:
      - ./otel-config.yaml:/etc/otel-collector-config.yaml
    command: ["--config=/etc/otel-collector-config.yaml"]
    depends_on:
      - stackstate

volumes:
  stackstate-data:
