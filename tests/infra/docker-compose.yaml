services:
  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.125.0
    container_name: otel-collector-test
    ports:
      - "4317:4317"
      - "4318:4318"
    volumes:
      - ./otel-config.yaml:/etc/otelcol-contrib/config.yaml
    environment:
      - STACKSTATE_OTLP_ENDPOINT=${STACKSTATE_OTLP_ENDPOINT:-host.docker.internal:443}
      - STACKSTATE_API_KEY=${STACKSTATE_API_KEY}
